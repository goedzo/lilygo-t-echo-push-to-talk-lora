<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: https://ssl.gstatic.com 'unsafe-eval'; style-src 'self' 'unsafe-inline'; media-src *; img-src 'self' data: content:;">
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
    <meta name="color-scheme" content="light dark">
    <link rel="stylesheet" href="css/index.css">
    <title>PTTLora</title>
</head>
<body>

    <div class="app-shell">

        <!-- Status Bar -->
        <header class="status-bar">
            <span class="status-indicator" id="statusDot"></span>
            <span class="status-text" id="deviceStatus">Connecting to device...</span>
            <button class="mode-action-btn" id="historyToggle" title="Message history" onclick="toggleMessageHistory()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                <span class="history-badge" id="historyBadge"></span>
            </button>
            <button class="log-toggle" id="logToggle" title="Toggle log">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
            </button>
        </header>

        <!-- Toast notification -->
        <div class="toast" id="toast"></div>

        <!-- Main Content Area (scrollable) -->
        <main class="content">

            <!-- Mode Selector -->
            <section class="card mode-section">
                <div class="mode-strip" id="modeStrip">
                    <button class="modePill" data-mode="RAW"><span>Raw</span></button>
                    <button class="modePill active" data-mode="TXT"><span>Txt</span></button>
                    <button class="modePill" data-mode="RANGE"><span>Range</span></button>
                    <button class="modePill" data-mode="TST"><span>Tst</span></button>
                    <button class="modePill" data-mode="PONG"><span>Pong</span></button>
                    <button class="modePill" data-mode="SCAN"><span>Scan</span></button>
                    <button class="modePill" data-mode="PTT"><span>Ptt</span></button>
                </div>
            </section>

            <!-- Device Selector (multi-device testing) -->
            <section class="card device-section" id="deviceSection" style="display:none;">
                <div class="device-strip" id="deviceStrip">
                    <!-- Connected devices populated dynamically -->
                </div>
            </section>

            <!-- T-Echo Screen Mirror -->
            <section class="card screen-section">
                <div class="screen-header">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                    <span>T-Echo Display</span>
                </div>
                <div class="screen-body" id="screen">
                    <div class="screen-line" data-line="0">&nbsp;</div>
                    <div class="screen-line" data-line="1">&nbsp;</div>
                    <div class="screen-line" data-line="2">&nbsp;</div>
                    <div class="screen-line" data-line="3">&nbsp;</div>
                    <div class="screen-line" data-line="4">&nbsp;</div>
                    <div class="screen-line" data-line="5">&nbsp;</div>
                    <div class="screen-line" data-line="6">&nbsp;</div>
                    <div class="screen-line" data-line="7">&nbsp;</div>
                    <div class="screen-line" data-line="8">&nbsp;</div>
                    <div class="screen-line" data-line="9">&nbsp;</div>
                    <div class="screen-line" data-line="10">&nbsp;</div>
                </div>
            </section>

            <!-- Text Input -->
            <section class="card input-section" id="inputSection">
                <div class="txt-input-header">
                    <span class="char-counter ok" id="charCounter">85 left</span>
                    <button class="clear-history-btn" onclick="clearMessageHistory()" title="Clear history">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                    </button>
                </div>
                <form class="send-form" id="sendForm">
                    <input type="text" id="inputField" placeholder="Type a message..." autocomplete="off" autocapitalize="none" maxlength="85" oninput="updateCharCounter(this.value.length)" />
                    <button type="submit" class="send-btn" id="sendBtn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                        Send
                    </button>
                </form>
                <div class="txt-status-area" id="txtStatusLine">
                    <span class="status-badge checking" id="txtChannelBadge">📡 Checking...</span>
                </div>
            </section>

            <!-- Message History Panel -->
            <section class="card history-section" id="messageHistoryPanel">
                <div class="history-header">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    <span>Message History</span>
                </div>
                <div class="history-body" id="messageHistoryContainer">
                    <!-- Messages populated by JS -->
                </div>
            </section>

            <!-- PTT Button -->
            <section class="card ptt-section" id="pttSection" style="display:none;">
                <div class="ptt-status-bar" id="pttStatus">
                    <span class="status-badge" id="bleBadge">📱 Connecting</span>
                    <span class="status-badge" id="loraBadge">📡 Checking...</span>
                </div>
                <button class="ptt-button" id="pttButton" disabled>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 15v1a3 3 0 003 3h8a3 3 0 003-3v-1"/></svg>
                    <span id="pttLabel">Connecting...</span>
                </button>
            </section>

            <!-- Device Info -->
            <section class="card info-section" id="infoSection" style="display:none;">
                <div class="info-header">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                    <span>Device Info</span>
                </div>
                <p class="info-text" id="deviceInfo">No data received yet.</p>
            </section>

        </main>

        <!-- Collapsible Console Log -->
        <aside class="log-panel" id="logPanel">
            <div class="log-header">
                <span>Log</span>
                <button class="log-close" id="logClose" title="Close log">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="log-body" id="console"></div>
        </aside>

    </div>

    <script src="cordova.js"></script>
    <script src="js/index.js"></script>

</body>
</html>
