; PlatformIO project file for LilyGO T-Echo LoRa PTT firmware
; Board: Adafruit Feather nRF52840 Express (nRF52840 / PCA10056)
; Radio: SX1262 (LoRa), Display: GxDEPG0150BN 1.54" e-paper, BLE for companion app

[platformio]
src_dir = main
include_dir = main
data_dir = main/data

; NOTE: PlatformIO Nordic nRF52 v10+ uses framework-arduinoadafruitnrf52
; which has a known incompatibility with Bluefruit52Lib BLE types.
; The firmware requires Arduino IDE's board package for proper BLE compilation.
; Use Arduino IDE (not PlatformIO) for building — see AGENTS.md build instructions.

[env:t-echo]
platform = nordicnrf52@~10.0
board = adafruit_feather_nrf52840
framework = arduino
monitor_speed = 115200
upload_protocol = nrfutil
upload_speed = 115200
; DFU mode: double-click T-Echo reset button, then platformio run --target upload

build_flags =
    ; SoftDevice SDK headers (required for Bluefruit52Lib BLE types)
    -I${PLATFORMIO_CORE_DIR}/packages/framework-arduinoadafruitnrf52/cores/nRF5/nordic/softdevice/s140_nrf52_6.1.1_API/include
    ; Local library paths for vendored libs in libraries/
    -Ilibraries/GxEPD2/src
    -Ilibraries/GxEPD/src
    -Ilibraries/RadioLib/src
    -Ilibraries/Codec2/src
    -Ilibraries/AceButton/src
    -Ilibraries/Button2/src
    -Ilibraries/PCF8563_Library/src
    -Ilibraries/Adafruit_GFX_Library
    -Ilibraries/Adafruit_BusIO
    -Ilibraries/Adafruit_EPD/src
    -Ilibraries/Adafruit_Unified_Sensor
    -Ilibraries/SdFat_-_Adafruit_Fork/src
    -Ilibraries/SerialFlash
    -Ilibraries/SoftSPI
    -Ilibraries/SoftSPIB
    -Ilibraries/MPU9250/src
    -Ilibraries/TinyGPSPlus/src
    ; E-paper panel defines (GxDEPG0150BN)
    -DGXEPD2_USE_GxDEPG0150BN=1
    -DSPI_PROFILE=4

build_src_filter =
    +<*>
    +<../main/lib/src>
    -<../main/lib/examples/>
    -<../main/lib/extras/>

lib_ldf_mode = deep+
lib_archive = no

[env:t-echo-debug]
inherits = env:t-echo
build_flags =
    ${env:t-echo.build_flags}
    -DDEBUG_ENABLED
    -O0
    -g3
; Use J-Link for debug upload (connect via SWD)
; upload_protocol = jlink
